            <button class="tx-filter" onclick="filterTx('أجرة شهرية')">أجرة شهرية</button>
            <button class="tx-filter" onclick="filterTx('دين قديم')">دين قديم</button>
            <button class="tx-filter" onclick="filterTx('سداد مخالفة')">سداد مخالفة</button>
            <button class="tx-filter" onclick="filterTx('تحصيل مخالفة')">تحصيل مخالفة</button>
            <button class="tx-filter" onclick="filterTx('سداد رسوم إقامة')">إقامة</button>
            <button class="tx-filter" onclick="filterTx('expense')">مصروفات</button>
            <button class="tx-filter" onclick="filterTx('revenue')">إيرادات</button>
          </div>
          <div id="txTableWrap"></div>
        </div>
      </div>
    `;
    document.getElementById('driverModal').classList.add('active');
    renderTxTable();
    loadOwnerNotes(driverId);
    // الافتراضي = نظرة عامة (ما يحتاج chart)، لكن نهيئ debt chart عند فتح أول مرة على المتصفح
  }

  /* ================= OWNER NOTES (سرية - مالك فقط) ================= */
  function escapeHtml(s) {
    return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function noteTypeMeta(t) {
    const m = {
      'عذر':    {icon:'🙏', color:'#58a6ff'},
      'اتفاق':  {icon:'🤝', color:'#3fb950'},
      'تحذير':  {icon:'⚠️', color:'#f85149'},
      'تذكير':  {icon:'⏰', color:'#d29922'},
      'ملاحظة': {icon:'📝', color:'#8b949e'}
    };
    return m[t] || m['ملاحظة'];
  }
  function renderOwnerNotesList(items) {
    const box = document.getElementById('ownerNotesList');
    if (!box) return;
    if (!items.length) { box.innerHTML = '<p class="small-muted">📝 ما عندك ملاحظات لهذا السائق — اكتب أول ملاحظة فوق.</p>'; return; }
    const sorted = items.slice().sort((a,b) => (toDate(b.at)||0) - (toDate(a.at)||0));
    box.innerHTML = sorted.map(n => {
      const meta = noteTypeMeta(n.type);
      const dt = toDate(n.at);
      const when = dt ? dt.toLocaleString('ar-KW') : '—';
      return '<div style="border:1px solid #30363d;border-right:3px solid '+meta.color+';border-radius:8px;padding:10px 12px;margin-bottom:8px;background:#0d1117;">'
        + '<div style="display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-bottom:6px;">'
        + '<span style="color:'+meta.color+';font-weight:600;font-size:12px;">'+meta.icon+' '+escapeHtml(n.type||'ملاحظة')+'</span>'
        + '<span class="small-muted" style="font-size:11px;">🕒 '+when+'</span>'
        + '</div>'
        + '<div style="white-space:pre-wrap;line-height:1.6;font-size:13px;">'+escapeHtml(n.text)+'</div>'
        + (n.by ? '<div class="small-muted" style="font-size:11px;margin-top:6px;">— '+escapeHtml(n.by)+'</div>' : '')
        + '</div>';
    }).join('');
  }
  async function loadOwnerNotes(driverId) {
    const box = document.getElementById('ownerNotesList');
    if (box) box.innerHTML = '<p class="small-muted">جاري التحميل...</p>';
    try {
      const doc = await firebase.firestore().collection('ownerNotes').doc(driverId).get();
      const items = [];
      if (doc.exists) {
        const d = doc.data();
        if (Array.isArray(d.entries)) d.entries.forEach(e => items.push(e));
        // ملاحظة قديمة (نظام سابق) تظهر كأقدم ملاحظة بالسجل عشان ما تضيع
        if (d.note && String(d.note).trim() && !(Array.isArray(d.entries) && d.entries.some(e => e.text === d.note))) {
          items.push({ text: d.note, type: 'ملاحظة', at: d.updatedAt || null, by: d.updatedBy || '' });
        }
      }
      renderOwnerNotesList(items);
    } catch(e) {
      console.error('loadOwnerNotes err:', e);
      if (box) box.innerHTML = '<p style="color:#f85149;font-size:12px;">⚠️ تعذّر تحميل الملاحظات: ' + escapeHtml(e.message||e) + '</p>';
    }
  }
  async function addOwnerNote() {
    if (!gModalDriver) return;
    const txt = document.getElementById('ownerNoteText');
    const typeSel = document.getElementById('ownerNoteType');
    const btn = document.getElementById('ownerNoteAddBtn');
    const status = document.getElementById('ownerNoteStatus');
    const text = (txt.value||'').trim();
    if (!text) { status.innerHTML = '<span style="color:#d29922;">اكتب نص الملاحظة أول</span>'; return; }
    const entry = {
      text: text,
      type: (typeSel && typeSel.value) || 'ملاحظة',
      at: new Date().toISOString(),
      by: gAuthUser ? gAuthUser.email : 'owner'
    };
    btn.disabled = true; btn.textContent = '⏳ يضيف...'; status.textContent = '';
    try {
      await firebase.firestore().collection('ownerNotes').doc(gModalDriver.id).set({
        driverId: gModalDriver.id,
        driverName: gModalDriver.name || gModalDriver.id,
        entries: firebase.firestore.FieldValue.arrayUnion(entry),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedBy: entry.by
      }, { merge: true });
      txt.value = '';
      status.innerHTML = '<span style="color:#3fb950;">✅ انضافت الملاحظة</span>';
      setTimeout(() => { status.textContent = ''; }, 3000);
      loadOwnerNotes(gModalDriver.id);
    } catch(e) {
      console.error('addOwnerNote err:', e);
      status.innerHTML = '<span style="color:#f85149;">❌ فشل الحفظ: ' + escapeHtml(e.message||e) + '</span>';
    } finally {
      btn.disabled = false; btn.textContent = '➕ إضافة ملاحظة';
    }
  }

  function switchMTab(name) {
    const tabs = ['overview','debt','payments','tx'];
    document.querySelectorAll('.mtab-btn').forEach((b,i) => b.classList.toggle('active', tabs[i] === name));
    document.querySelectorAll('.mtab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('mtab-' + name).classList.add('active');
    if (name === 'debt') renderDebtTrendChart();
    else if (name === 'payments') renderPaymentsChart();
  }

  function changeDebtRange(days) {
    gDebtRangeDays = days;
    document.querySelectorAll('.range-pill').forEach(p => p.classList.toggle('active', +p.dataset.range === days));
    renderDebtTrendChart();
  }

  function renderDebtTrendChart() {
    if (!gModalDriver || typeof Chart === 'undefined') return;
    const canvas = document.getElementById('debtTrendChart');
    if (!canvas) return;
    // تنظيف chart قديم
    gModalCharts = gModalCharts.filter(c => { if (c.canvas === canvas) { c.destroy(); return false; } return true; });

    const series = getDebtSeries(gModalDriver, gDebtRangeDays);
    const labels = series.map(p => p.date.toLocaleDateString('ar-KW', {day:'numeric', month:'short'}));
    const debtData = series.map(p => +p.debt.toFixed(3));
    const thr = getDebtThreshold(gModalDriver);
    const thrLine = series.map(() => +thr.toFixed(3));

    // نقاط الدفعات داخل النطاق
    const startDate = new Date(Date.now() - gDebtRangeDays * 86400000);
    const drvPays = gPayments.filter(p => p.driverId===gModalDriver.id && RENT_TYPES.includes(p.type) &&
                                          toDate(p.date) && toDate(p.date) >= startDate);
    // نضع كل دفعة عند أقرب نقطة في series
    const payPoints = drvPays.map(p => {
      const d = toDate(p.date);
      let bestIdx = 0, bestDiff = Infinity;
      series.forEach((pt, i) => { const diff = Math.abs(pt.date - d); if (diff < bestDiff) { bestDiff = diff; bestIdx = i; } });
      return { x: bestIdx, y: series[bestIdx].debt, amount: parseFloat(p.amount||0), date: d };
    });

    const ch = new Chart(canvas, {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: 'إجمالي الدين (د.ك)',
            data: debtData,
            borderColor: '#fb8500', backgroundColor: 'rgba(251,133,0,0.15)',
            fill: true, tension: 0.25, borderWidth: 2, pointRadius: 0
          },
          {
            label: 'عتبة الخطر',
            data: thrLine,
            borderColor: '#f85149', borderDash: [6,4], borderWidth: 1.5,
            pointRadius: 0, fill: false
          },
          {
            label: 'دفعات', type: 'scatter',
            data: payPoints.map(p => ({ x: labels[p.x], y: p.y })),
            backgroundColor: '#58a6ff', borderColor: '#58a6ff',
            pointRadius: 5, pointHoverRadius: 7, showLine: false
          }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: '#c9d1d9', font: { family: 'inherit' } } },
          tooltip: { callbacks: { label: (ctx) => ctx.dataset.label + ': ' + (+ctx.parsed.y).toFixed(3) + ' د.ك' } }
        },
        scales: {
          x: { ticks: { color: '#8b949e', maxTicksLimit: 10 }, grid: { color: '#21262d' } },
          y: { ticks: { color: '#8b949e', callback: v => (+v).toFixed(0) }, grid: { color: '#21262d' }, beginAtZero: true }
        }
      }
    });
    gModalCharts.push(ch);

    // ملخص نصي تحت الـ chart
    const first = series[0].debt, last = series[series.length-1].debt;
    const diff = last - first;
    const sign = diff > 0 ? '▲ زاد' : (diff < 0 ? '▼ نقص' : '⏸ ثبت');
    const color = diff > 0 ? '#f85149' : (diff < 0 ? '#3fb950' : '#8b949e');
    document.getElementById('debtTrendSummary').innerHTML = `
      <div style="display:flex;gap:14px;flex-wrap:wrap;font-size:13px;">
        <span>دين قبل ${gDebtRangeDays} يوم: <b>${fmtKD(first)}</b></span>
        <span>اليوم: <b>${fmtKD(last)}</b></span>
        <span style="color:${color};font-weight:700;">${sign} ${fmtKD(Math.abs(diff))}</span>
        <span>عدد الدفعات في الفترة: <b>${drvPays.length}</b></span>
      </div>`;
  }

  function renderPaymentsChart() {
    if (!gModalDriver || typeof Chart === 'undefined') return;
    const canvas = document.getElementById('paymentsChart');
    if (!canvas) return;
    gModalCharts = gModalCharts.filter(c => { if (c.canvas === canvas) { c.destroy(); return false; } return true; });

    const buckets = getPaymentBuckets(gModalDriver, 12);
    const labels = buckets.map(b => b.label);
    const paid = buckets.map(b => +b.paid.toFixed(3));
    const expectedLine = buckets.map(b => +b.expected.toFixed(3));

    const ch = new Chart(canvas, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          {
            label: 'المدفوع', data: paid,
            backgroundColor: paid.map((v,i) => v >= buckets[i].expected*0.9 ? '#3fb950' : (v >= buckets[i].expected*0.5 ? '#d29922' : '#f85149')),
            borderRadius: 4
          },
          {
            label: 'المتوقع', type: 'line', data: expectedLine,
            borderColor: '#fb8500', borderWidth: 2, borderDash: [4,4],
            pointRadius: 3, pointBackgroundColor: '#fb8500', fill: false, tension: 0
          }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: '#c9d1d9', font: { family: 'inherit' } } },
          tooltip: { callbacks: { label: (ctx) => ctx.dataset.label + ': ' + (+ctx.parsed.y).toFixed(3) + ' د.ك' } }
        },
        scales: {
          x: { ticks: { color: '#8b949e' }, grid: { color: '#21262d' } },
          y: { ticks: { color: '#8b949e' }, grid: { color: '#21262d' }, beginAtZero: true }
        }
      }
    });
    gModalCharts.push(ch);
  }

  function filterTx(filter) {
    gTxFilter = filter;
    document.querySelectorAll('#txFilters .tx-filter').forEach(b => {
      b.classList.toggle('active', b.textContent.trim() === ({all:'الكل',expense:'مصروفات',revenue:'إيرادات','سداد رسوم إقامة':'إقامة'}[filter] || filter));
    });
    renderTxTable();
  }

  function renderTxTable() {
    if (!gModalDriver) return;
    const wrap = document.getElementById('txTableWrap');
    if (!wrap) return;
    let txs = getAllTransactions(gModalDriver.id);
    if (gTxFilter !== 'all') {
      if (gTxFilter === 'expense') txs = txs.filter(t => t.cat === 'expense');
      else if (gTxFilter === 'revenue') txs = txs.filter(t => t.cat === 'revenue');
      else txs = txs.filter(t => t.type === gTxFilter);
    }
    const total = txs.reduce((s,t) => s + t.amount, 0);
    wrap.innerHTML = `
      <p class="small-muted" style="margin-bottom:8px;">عدد المعاملات: <b>${txs.length}</b> · المجموع: <b style="color:${total>=0?'#3fb950':'#f85149'};">${fmtKD(total)}</b></p>
      <div class="table-wrap" style="max-height:420px;">
        <table>
          <thead><tr><th>التاريخ</th><th>النوع</th><th>المبلغ</th><th>الوصف</th><th>المرجع</th></tr></thead>
          <tbody>${
            txs.length === 0 ? '<tr><td colspan="5" style="color:#8b949e;padding:20px;">لا توجد معاملات</td></tr>' :
            txs.map(t => `
              <tr>
                <td>${fmtDate(t.date)}</td>
                <td>${t.type}</td>
                <td style="color:${t.amount>=0?'#3fb950':'#f85149'};font-weight:600;">${fmtKD(Math.abs(t.amount))}${t.amount<0?' −':''}</td>
                <td style="text-align:right;">${t.desc||'—'}</td>
                <td><span class="small-muted">${t.ref||'—'}</span></td>
              </tr>`).join('')
          }</tbody>
        </table>
      </div>`;
  }

  function closeModal() {
    destroyModalCharts();
    gModalDriver = null;
    document.getElementById('driverModal').classList.remove('active');
  }

  /* ================= QUICK SEARCH (شريط البحث) ================= */
  function onDriverSearch(q) {
    const box = document.getElementById('searchResults');
    q = (q||'').trim().toLowerCase();
    if (!q) { box.classList.remove('active'); box.innerHTML=''; return; }
    const results = gDrivers.filter(d => !d.isArchived).filter(d => {
      return (d.name||'').toLowerCase().includes(q) ||
             (d.id||'').toLowerCase().includes(q) ||
             (d.employeeNumber||'').toLowerCase().includes(q) ||
             (d.phone||'').includes(q);
    }).slice(0, 10);
    if (results.length === 0) {
      box.innerHTML = '<div class="item" style="color:#8b949e;cursor:default;">لا توجد نتائج</div>';
    } else {
      box.innerHTML = results.map(d => {
        const split = calcDebtSplit(d.id, d);
        return `<div class="item" onmousedown="openDriverModal('${d.id}');document.getElementById('driverSearch').value='';document.getElementById('searchResults').classList.remove('active');">
          <div><b>${d.name||d.id}</b> <span class="meta">— ${d.employeeNumber||d.id}</span></div>
          <div class="meta">${d.phone||''} · دين: ${fmtKD(split.total)}</div>
        </div>`;
      }).join('');
    }
    box.classList.add('active');
  }

  /* ================= EXPORT CSV ================= */
  function exportCSV() {
    const today = new Date();
    const active = gDrivers.filter(d => !d.isArchived);
    const headers = ['السائق','نوع العقد','بداية العقد','الدين الجاري','الدين القديم','الإجمالي','الانتظام','الاتجاه','الربح الصافي','التصنيف'];
    const lines = [headers.join(',')];
    active.forEach(driver => {
      const split = calcDebtSplit(driver.id, driver);
      const reg = calcRegularity(driver);
      const prev = calcDebtAtDate(driver, new Date(today.getTime() - 7*86400000));
      const trend = split.total - prev;
      const cls = classifyDriver(driver, split, reg, trend);
      const profit = calcDriverProfit(driver);
      lines.push([
        '"'+(driver.name||driver.id)+'"',
        driver.contractType==='monthly'?'شهري':'يومي',
        fmtDate(toDate(driver.contractStartDate)),
        split.current.toFixed(3),
        split.old.toFixed(3),
        split.total.toFixed(3),
        reg+'%',
        trend.toFixed(3),
        profit.netProfit.toFixed(3),
        cls.label.replace(/[🔴🟠🟡🔵🟢]/g,'').trim()
      ].join(','));
    });
    const blob = new Blob(['﻿'+lines.join('\n')], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'owner-report-'+today.toISOString().slice(0,10)+'.csv';
    a.click();
    URL.revokeObjectURL(url);
  }
  </script>
